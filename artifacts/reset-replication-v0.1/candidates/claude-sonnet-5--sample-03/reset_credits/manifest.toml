schema_version = "1.0"
candidate_id = "reset_credits"
[design]
top = "reset_credits"
sources = ["design.sv"]
[functional]
commands = [
  ["iverilog", "-g2012", "-o", "${SVGAP_BUILD}/sim.vvp", "design.sv", "tb.sv"],
  ["vvp", "${SVGAP_BUILD}/sim.vvp"],
]
[structural]
backend = "reference-yosys"
[intent]
asynchronous_groups = []
[[intent.clocks]]
name = "link"
port = "clk"
[[intent.resets]]
name = "link_reset"
port = "async_reset_n"
active = "low"
assertion = "async"
deassertion = "sync"
[output]
report = "report.json"
