name: Report a Harbor run
description: Share a completed run, partial run, or setup blocker in about two minutes.
title: "run report: "
labels: ["run-report", "research"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for trying the reset-release experiment. A short report is useful even when the run failed or the result contradicted the expected pattern. This form is an opt-in public research receipt, not a result submission. Do not include credentials, proprietary RTL, confidential constraints, private checkpoint mappings, or unreviewed provider transcripts.

  - type: dropdown
    id: run_kind
    attributes:
      label: What did you run?
      options:
        - Known-good Oracle check
        - Non-Oracle agent or model
        - Both Oracle and non-Oracle runs
        - Setup attempt only
    validations:
      required: true

  - type: input
    id: dataset
    attributes:
      label: Dataset version
      description: Keep the exact pinned identifier when possible.
      value: svgap/svgap-reset-release@0.2
    validations:
      required: true

  - type: dropdown
    id: completion
    attributes:
      label: Run status
      options:
        - Completed all eight tasks
        - Completed some tasks
        - Blocked during setup
        - Blocked during evaluation
    validations:
      required: true

  - type: input
    id: agent
    attributes:
      label: Agent and model
      description: An exact public identifier is helpful but not required for a short run report.
      placeholder: agent-name, model-name or withheld

  - type: textarea
    id: outcome
    attributes:
      label: What happened?
      description: Counts or one sentence are enough. Include test passes, wiring-rule passes, hidden failures, or the blocker you encountered.
      placeholder: Seven tasks passed simulation; two of those failed the reset wiring rule.
    validations:
      required: true

  - type: input
    id: public_job
    attributes:
      label: Public job or evidence link
      description: Optional. Harbor uploads are not required.
      placeholder: https://...

  - type: textarea
    id: observation
    attributes:
      label: What was surprising or unclear?
      description: Counterexamples, confusing instructions, and disagreement with the rule are especially useful.

  - type: dropdown
    id: next_step
    attributes:
      label: Preferred next step
      options:
        - This report is enough for now
        - Help me interpret the result
        - Help me turn this into a full evidence contribution
        - Discuss a counterexample or rule critique
        - Co-design another task or experiment
    validations:
      required: true

  - type: checkboxes
    id: safety
    attributes:
      label: Public-safety confirmation
      options:
        - label: I have not included confidential, proprietary, credential, or export-controlled material.
          required: true

