name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - name: Install open RTL tools
        run: sudo apt-get update && sudo apt-get install -y iverilog yosys
      - name: Install SV-Gap
        run: python -m pip install -e ".[dev]"
      - name: Check prerequisites
        run: svgap doctor
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Verify public artifacts
        run: python scripts/verify_public_artifacts.py
      - name: Verify public result registry
        run: |
          python scripts/build_adoption_baseline.py --check
          python scripts/verify_result_registry.py
          python scripts/build_result_pages.py --check
      - name: Check documentation links
        run: python scripts/check_docs_links.py

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v6
        with:
          name: python-distributions
          path: dist/

  container:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - name: Build pinned open-tool container
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: svgap:ci
      - name: Exercise container quickstart
        run: docker run --rm -v "$PWD:/work" svgap:ci check examples/reset_release/unsafe/manifest.toml || test $? -eq 1
