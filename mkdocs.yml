site_name: SV-Gap
site_description: Production-evidence evaluation for AI-generated digital RTL
site_url: https://shsridhar-beep.github.io/svgap/
repo_url: https://github.com/shsridhar-beep/svgap
repo_name: shsridhar-beep/svgap

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: teal

nav:
  - Home: index.md
  - Get started:
      - Harbor experiment: harbor.md
      - Evaluate your model: evaluate-your-model.md
      - Bring your own RTL: bring-your-own-rtl.md
      - Linux install and doctor: linux-install-and-doctor.md
      - Existing benchmarks: integrating-existing-benchmarks.md
      - CI and container: ci-and-container.md
      - Submit a result: submitting-results.md
  - Results:
      - Evidence profiles: results.md
  - Research:
      - Compact research note: compact-research-note.md
      - Frontier-model workflows: frontier-model-research.md
      - Evaluate your model: evaluate-your-model.md
      - Controlled result: controlled-result.md
      - Reset-release result: reset-replication-result.md
      - Cross-oracle naja result: cross-oracle-naja-result.md
      - Benchmark audit: benchmark-audit.md
      - Power-on benchmark audit: power-on-benchmark-audit.md
      - RTL designer review protocol: rtl-designer-review-protocol.md
      - Independent review result: independent-review-result.md
      - Methodology: methodology.md
      - Limitations: limitations.md
  - Extend:
      - Architecture: architecture.md
      - Python API: python-api.md
      - Backend SDK: backend-sdk.md
      - Reference naja backend: reference-naja-backend.md
      - Adjudication scaffold: adjudication-scaffold.md
      - Scope boundary: scope-boundary.md
  - Community:
      - Research pulse: community-pulse.md
      - Collaborate: collaboration-rfc.md
      - Design-partner workflow: design-partner-workflow.md
      - Experiment contract: experiment-contract-template.md

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - pymdownx.details
  - pymdownx.superfences

strict: true
