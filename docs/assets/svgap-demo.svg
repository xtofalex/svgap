<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560" role="img" aria-labelledby="title desc">
  <title id="title">SV-Gap turns an offline pass into an evidence profile</title>
  <desc id="desc">Two RTL candidates pass the same functional oracle. Declared reset intent and structural evidence distinguish them.</desc>
  <defs><linearGradient id="bg" x2="1" y2="1"><stop stop-color="#0b1020"/><stop offset="1" stop-color="#141b34"/></linearGradient></defs>
  <rect width="1100" height="560" rx="28" fill="url(#bg)"/>
  <text x="60" y="72" fill="#f8fafc" font-family="system-ui,sans-serif" font-size="34" font-weight="700">Same benchmark result. Different production evidence.</text>
  <text x="60" y="108" fill="#9aa8c7" font-family="system-ui,sans-serif" font-size="19">SV-Gap makes the handoff question explicit without claiming signoff.</text>
  <g fill="#1d2746" stroke="#415276">
    <rect x="60" y="150" width="270" height="124" rx="16"/><rect x="415" y="150" width="270" height="124" rx="16"/><rect x="770" y="150" width="270" height="124" rx="16"/>
  </g>
  <g font-family="ui-monospace,monospace" font-size="15" fill="#9aa8c7"><text x="86" y="188">RESEARCH OUTPUT</text><text x="441" y="188">SV-GAP</text><text x="796" y="188">HANDOFF RECORD</text></g>
  <g font-family="system-ui,sans-serif" font-size="23" font-weight="650" fill="#f8fafc"><text x="86" y="225">RTL + functional pass</text><text x="441" y="225">Intent + evidence</text><text x="796" y="225">Reviewable rationale</text></g>
  <g font-family="ui-monospace,monospace" font-size="16"><text x="86" y="252" fill="#71e6a5">oracle: PASS</text><text x="441" y="252" fill="#74b9ff">answered · failed · unknown</text><text x="796" y="252" fill="#c4b5fd">what evidence resolves next</text></g>
  <g stroke="#74b9ff" stroke-width="4" fill="none" stroke-linecap="round"><path d="M342 212h57m-8-10 12 10-12 10"/><path d="M697 212h57m-8-10 12 10-12 10"/></g>
  <rect x="60" y="330" width="980" height="166" rx="18" fill="#0a0f1d" stroke="#2b3857"/>
  <g font-family="ui-monospace,monospace"><text x="88" y="366" fill="#7081a6" font-size="15">$ svgap demo</text>
    <g fill="#9aa8c7" font-size="17"><text x="88" y="407">candidate</text><text x="300" y="407">functional</text><text x="505" y="407">structural</text><text x="730" y="407">finding</text></g>
    <g font-size="18"><text x="88" y="447" fill="#f8fafc">safe</text><text x="300" y="447" fill="#71e6a5">pass</text><text x="505" y="447" fill="#71e6a5">pass</text><text x="730" y="447" fill="#9aa8c7">none</text>
      <text x="88" y="480" fill="#f8fafc">unsafe</text><text x="300" y="480" fill="#71e6a5">pass</text><text x="505" y="480" fill="#ff8d8d">fail</text><text x="730" y="480" fill="#ffb86c">REF-RDC-001</text></g>
  </g>
  <text x="60" y="535" fill="#7081a6" font-family="system-ui,sans-serif" font-size="14">Configured open-source evidence · digital RTL only · not silicon signoff</text>
</svg>
