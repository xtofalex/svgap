<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="440" viewBox="0 0 1100 440" role="img" aria-labelledby="title desc">
  <title id="title">SV-Gap turns an offline pass into an evidence profile</title>
  <desc id="desc">Two RTL candidates pass the same functional oracle. Declared reset intent and structural evidence distinguish them: the safe witness passes both checks, the unsafe witness fails REF-RDC-001.</desc>
  <rect width="1100" height="440" rx="24" fill="#0D110A"/>
  <text x="60" y="62" fill="#ECF2E6" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="32" font-weight="700">Same benchmark result. Different production evidence.</text>
  <text x="60" y="96" fill="#98A190" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="18">The functional result, declared design intent, and structural evidence, in one reviewable profile.</text>

  <rect x="60" y="122" width="980" height="252" rx="14" fill="#141A10" stroke="#2A331C" stroke-width="1.5"/>
  <circle cx="90" cy="150" r="6" fill="#F96167"/>
  <circle cx="112" cy="150" r="6" fill="#E5B33C"/>
  <circle cx="134" cy="150" r="6" fill="#76B900"/>
  <text x="1012" y="155" fill="#555E45" font-family="Menlo,Monaco,'Courier New',monospace" font-size="14" text-anchor="end">the public witness pair</text>

  <g font-family="Menlo,Monaco,'Courier New',monospace">
    <text x="90" y="196" fill="#A8D95C" font-size="17">$ svgap demo</text>
    <g fill="#98A190" font-size="16">
      <text x="90" y="234">candidate</text>
      <text x="330" y="234">functional</text>
      <text x="560" y="234">structural</text>
      <text x="790" y="234">finding</text>
    </g>
    <g font-size="17">
      <text x="90" y="272" fill="#ECF2E6">safe</text>
      <text x="330" y="272" fill="#76B900">pass</text>
      <text x="560" y="272" fill="#76B900">pass</text>
      <text x="790" y="272" fill="#98A190">none</text>
      <text x="90" y="308" fill="#ECF2E6">unsafe</text>
      <text x="330" y="308" fill="#76B900">pass</text>
      <text x="560" y="308" fill="#E5B33C">fail</text>
      <text x="790" y="308" fill="#F96167">REF-RDC-001</text>
    </g>
    <text x="90" y="350" fill="#98A190" font-size="15">unknown and tool_error never count as pass</text>
  </g>

  <text x="60" y="414" fill="#555E45" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="14">Configured open-source evidence · digital RTL only · not silicon signoff</text>
</svg>
