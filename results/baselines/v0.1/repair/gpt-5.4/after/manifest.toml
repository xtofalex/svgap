schema_version = "1.0"
candidate_id = "repair-reset-release"
[design]
top = "reset_release"
sources = ["design.sv"]
[functional]
commands = [
  ["iverilog", "-g2012", "-o", "${SVGAP_BUILD}/sim.vvp", "design.sv", "../tb.sv"],
  ["vvp", "${SVGAP_BUILD}/sim.vvp"],
]
[structural]
backend = "reference-yosys"
[intent]
asynchronous_groups = []
[[intent.clocks]]
name = "core"
port = "clk"
[[intent.resets]]
name = "power_on_reset"
port = "arst_n"
active = "low"
assertion = "async"
deassertion = "sync"
[output]
report = "report.json"
